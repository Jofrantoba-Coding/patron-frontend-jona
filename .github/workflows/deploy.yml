name: Deploy Docs & Storybook

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web_ts/uijona/package-lock.json

      - name: Install uijona dependencies
        run: npm ci --legacy-peer-deps
        working-directory: web_ts/uijona

      - name: Build Storybook
        run: npx storybook build --output-dir ../storybook-dist
        working-directory: web_ts/uijona

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build Jekyll docs
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./web_ts/docs
          destination: ./_site

      - name: Copy Storybook into docs site
        run: |
          sudo chown -R "$USER:$USER" _site
          mkdir -p _site/storybook
          cp -R web_ts/storybook-dist/. _site/storybook/
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
