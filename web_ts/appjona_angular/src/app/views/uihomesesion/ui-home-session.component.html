<app-border-layout>
  <app-header slot="north" />
  <div slot="center" class="max-w-sm mx-auto p-4 space-y-4">
    <h2 class="text-xl font-semibold text-gray-800 dark:text-white">
      Welcome, {{ name }}
    </h2>
    <p class="text-sm text-gray-600 dark:text-gray-300">
      Active session: {{ email }}
    </p>
    <button
      (click)="handlerLogout()"
      class="text-white bg-red-600 hover:bg-red-700 focus:ring-4 focus:outline-none focus:ring-red-300 font-medium rounded-lg text-sm px-5 py-2.5"
    >
      Logout
    </button>
  </div>
  <app-footer slot="south" />
</app-border-layout>
