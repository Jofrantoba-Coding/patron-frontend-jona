openapi: 3.1.0
info:
  title: Consola H2H · API (BCP Host-to-Host multi-tenant)
  version: 1.0.0
  description: >
    Contrato de la Consola Host-to-Host de Jofrantoba Consulting TI (tenant demo: Develtrex).
    Fuente de verdad para el mock-server (`web_ts/h2h/mock-server`) y la consola Angular.
    Modela el flujo BCP H2H: operaciones → planillas (TXT/XML) → cifrado (OpenSSL/PGP) →
    envío SFTP → respuestas (-RES/-VAL/-RES2/-PAR) → certificados/RBAC, con una bandeja
    global de documentos. Los nombres de campos siguen el DDL real (sch_h2h, sch_maestra,
    sch_operaciones, sch_bucket, sch_logs).
servers:
  - url: http://localhost:4010
    description: Mock server local

tags:
  - name: Auth
  - name: Tenants
  - name: Dashboard
  - name: Monitoring
  - name: Catálogos
  - name: Estructuras
  - name: Beneficiarios
  - name: Operaciones
  - name: Planillas
  - name: Respuestas
  - name: Documentos
  - name: Certificados
  - name: Identity/RBAC
  - name: Auditoría

security:
  - bearerAuth: []

paths:
  /mock/auth/login:
    post:
      tags: [Auth]
      summary: Login (mock) y obtención de contexto de tenant
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username: { type: string }
                password: { type: string }
                tenantSubdomain: { type: string }
      responses:
        '200':
          description: Sesión iniciada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LoginResponse' }

  /v1/me/context:
    get:
      tags: [Auth]
      summary: Contexto del usuario autenticado (tenant + permisos efectivos)
      parameters: [ { $ref: '#/components/parameters/OrgId' }, { $ref: '#/components/parameters/CorrId' } ]
      responses:
        '200':
          description: Contexto
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TenantContext' }

  /v1/tenants/current:
    get:
      tags: [Tenants]
      summary: Tenant actual
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Tenant' } } } }
  /v1/tenants:
    get:
      tags: [Tenants]
      summary: Lista de tenants (backoffice)
      parameters: [ { $ref: '#/components/parameters/Page' }, { $ref: '#/components/parameters/PageSize' } ]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/PaginatedTenant' } } } }
    post:
      tags: [Tenants]
      summary: Alta de tenant (backoffice)
      parameters: [ { $ref: '#/components/parameters/IdemKey' } ]
      requestBody: { required: true, content: { application/json: { schema: { type: object } } } }
      responses:
        '201': { description: Creado, content: { application/json: { schema: { $ref: '#/components/schemas/Tenant' } } } }

  /v1/dashboard/summary:
    get:
      tags: [Dashboard]
      summary: Resumen operativo del día (KPIs + pipeline + alertas)
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/DashboardSummary' } } } }

  /v1/monitoring/health:
    get:
      tags: [Monitoring]
      summary: Salud de servicios dependientes
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Health' } } } }

  /v1/catalogs:
    get:
      tags: [Catálogos]
      summary: Todos los catálogos (parametría)
      responses:
        '200':
          description: Mapa código→valores
          content:
            application/json:
              schema:
                type: object
                additionalProperties: { type: array, items: { type: string } }
  /v1/catalogs/{code}:
    get:
      tags: [Catálogos]
      summary: Un catálogo por código
      parameters:
        - { name: code, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  catalogo: { type: string }
                  items: { type: array, items: { type: string } }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/estructuras:
    get:
      tags: [Estructuras]
      summary: Estructuras de archivo (sch_h2h.tm_ear_estructura_archivo)
      parameters:
        - { name: producto, in: query, schema: { $ref: '#/components/schemas/ProductoGrupo' } }
        - { name: formato, in: query, schema: { $ref: '#/components/schemas/FormatoArchivo' } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items: { type: array, items: { $ref: '#/components/schemas/EstructuraArchivo' } }

  /v1/beneficiarios:
    get:
      tags: [Beneficiarios]
      summary: Maestro de beneficiarios
      parameters: [ { $ref: '#/components/parameters/Page' }, { $ref: '#/components/parameters/PageSize' } ]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/PaginatedBeneficiario' } } } }
  /v1/beneficiarios/{id}:
    get:
      tags: [Beneficiarios]
      summary: Beneficiario por id
      parameters: [ { name: id, in: path, required: true, schema: { type: string, format: uuid } } ]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Beneficiario' } } } }
        '404': { $ref: '#/components/responses/NotFound' }
  /v1/beneficiarios/{id}/cuentas:
    get:
      tags: [Beneficiarios]
      summary: Cuentas bancarias del beneficiario
      parameters: [ { name: id, in: path, required: true, schema: { type: string, format: uuid } } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items: { type: array, items: { $ref: '#/components/schemas/CuentaBancaria' } }

  /v1/operaciones:
    get:
      tags: [Operaciones]
      summary: Lista de operaciones (filtrable por producto/subtipo)
      parameters:
        - { name: producto, in: query, schema: { $ref: '#/components/schemas/ProductoGrupo' } }
        - { name: subtipo, in: query, schema: { type: string } }
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/PageSize' }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/PaginatedOperacion' } } } }
  /v1/operaciones/manual:
    post:
      tags: [Operaciones]
      summary: Alta manual de operación
      parameters: [ { $ref: '#/components/parameters/IdemKey' } ]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/OperacionManualInput' } } } }
      responses:
        '201': { description: Creada, content: { application/json: { schema: { $ref: '#/components/schemas/Operacion' } } } }
  /v1/operaciones/carga:
    post:
      tags: [Operaciones]
      summary: Carga masiva de operaciones (archivo/lote)
      parameters: [ { $ref: '#/components/parameters/IdemKey' } ]
      requestBody: { content: { application/json: { schema: { type: object } } } }
      responses:
        '202':
          description: Aceptada para validación
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CargaResultado' }
  /v1/operaciones/{id}:
    get:
      tags: [Operaciones]
      summary: Operación por id
      parameters: [ { name: id, in: path, required: true, schema: { type: string, format: uuid } } ]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Operacion' } } } }
        '404': { $ref: '#/components/responses/NotFound' }
  /v1/operaciones/{id}/anular:
    patch:
      tags: [Operaciones]
      summary: Anular operación
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { $ref: '#/components/parameters/IdemKey' }
      requestBody: { content: { application/json: { schema: { type: object, properties: { motivo: { type: string } } } } } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Operacion' } } } }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/planillas:
    get:
      tags: [Planillas]
      summary: Lista de planillas (filtrable por producto/subtipo)
      parameters:
        - { name: producto, in: query, schema: { $ref: '#/components/schemas/ProductoGrupo' } }
        - { name: subtipo, in: query, schema: { type: string } }
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/PageSize' }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/PaginatedPlanilla' } } } }
  /v1/planillas/generar:
    post:
      tags: [Planillas]
      summary: Generar planilla desde operaciones seleccionadas
      parameters: [ { $ref: '#/components/parameters/IdemKey' } ]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/PlanillaGenerarInput' } } } }
      responses:
        '201': { description: Generada, content: { application/json: { schema: { $ref: '#/components/schemas/Planilla' } } } }
  /v1/planillas/{id}:
    get:
      tags: [Planillas]
      summary: Planilla por id
      parameters: [ { name: id, in: path, required: true, schema: { type: string, format: uuid } } ]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Planilla' } } } }
        '404': { $ref: '#/components/responses/NotFound' }
  /v1/planillas/{id}/preview:
    get:
      tags: [Planillas]
      summary: Vista previa del contenido claro (TXT/XML)
      parameters: [ { name: id, in: path, required: true, schema: { type: string, format: uuid } } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PlanillaPreview' }
  /v1/planillas/{id}/detalles:
    get:
      tags: [Planillas]
      summary: Detalles (operaciones) de la planilla
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/PageSize' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items: { type: array, items: { $ref: '#/components/schemas/PlanillaDetalle' } }
                  pagination: { $ref: '#/components/schemas/Pagination' }
  /v1/planillas/{id}/{accion}:
    post:
      tags: [Planillas]
      summary: Ejecutar acción del ciclo de vida de la planilla
      description: 'accion ∈ validar | cifrar | enviar | reintentar-envio | cancelar'
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: accion, in: path, required: true, schema: { type: string, enum: [validar, cifrar, enviar, reintentar-envio, cancelar] } }
        - { $ref: '#/components/parameters/IdemKey' }
      requestBody: { content: { application/json: { schema: { type: object, properties: { motivo: { type: string } } } } } }
      responses:
        '202':
          description: Acción aceptada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PlanillaAction' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/respuestas:
    get:
      tags: [Respuestas]
      summary: Respuestas BCP (opcionalmente por planilla)
      parameters:
        - { name: planillaId, in: query, schema: { type: string, format: uuid } }
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/PageSize' }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/PaginatedRespuesta' } } } }
  /v1/respuestas/cargar-manual:
    post:
      tags: [Respuestas]
      summary: Cargar respuesta manualmente
      parameters: [ { $ref: '#/components/parameters/IdemKey' } ]
      requestBody: { required: true, content: { application/json: { schema: { type: object } } } }
      responses:
        '201': { description: Creada, content: { application/json: { schema: { $ref: '#/components/schemas/RespuestaBCP' } } } }
  /v1/respuestas/{id}/procesar:
    post:
      tags: [Respuestas]
      summary: Procesar respuesta (aplica estados a la planilla/operaciones)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { $ref: '#/components/parameters/IdemKey' }
      requestBody: { content: { application/json: { schema: { type: object, properties: { dryRun: { type: boolean } } } } } }
      responses:
        '202':
          description: Procesada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RespuestaProcesada' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/documentos:
    get:
      tags: [Documentos]
      summary: Bandeja global de documentos (planillas + respuestas, claro y cifrado)
      description: >
        Vista unificada de todos los archivos del flujo H2H con filtros. Une planillas
        enviadas y respuestas BCP en una fila común `Documento`.
      parameters:
        - { name: producto, in: query, schema: { $ref: '#/components/schemas/ProductoGrupo' } }
        - { name: subtipo, in: query, schema: { type: string } }
        - { name: tipoDocumento, in: query, schema: { type: string, enum: [PLANILLA, RESPUESTA] } }
        - { name: estado, in: query, schema: { type: string } }
        - { name: formato, in: query, schema: { $ref: '#/components/schemas/FormatoArchivo' } }
        - { name: modalidad, in: query, schema: { type: string, enum: [H2H, H2W] } }
        - { name: cifrado, in: query, schema: { type: boolean } }
        - { name: fechaDesde, in: query, schema: { type: string, format: date } }
        - { name: fechaHasta, in: query, schema: { type: string, format: date } }
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/PageSize' }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/PaginatedDocumento' } } } }
  /v1/documentos/{id}:
    get:
      tags: [Documentos]
      summary: Documento por id
      parameters: [ { name: id, in: path, required: true, schema: { type: string } } ]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Documento' } } } }
        '404': { $ref: '#/components/responses/NotFound' }
  /v1/documentos/{id}/preview:
    get:
      tags: [Documentos]
      summary: Vista previa del contenido del documento (planilla o respuesta)
      parameters: [ { name: id, in: path, required: true, schema: { type: string } } ]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/DocumentoPreview' } } } }
        '404': { $ref: '#/components/responses/NotFound' }
  /v1/documentos/{id}/download:
    get:
      tags: [Documentos]
      summary: Referencia de descarga del documento (variante claro o cifrado)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: variante, in: query, schema: { type: string, enum: [claro, cifrado], default: claro } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  documentoId: { type: string }
                  variante: { type: string, enum: [claro, cifrado] }
                  url: { type: string }
                  nombre: { type: string }
                  contentType: { type: string }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/certificados:
    get:
      tags: [Certificados]
      summary: Certificados de cifrado (tenant + BCP)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items: { type: array, items: { $ref: '#/components/schemas/Certificado' } }
    post:
      tags: [Certificados]
      summary: Registrar/generar certificado
      parameters: [ { $ref: '#/components/parameters/IdemKey' } ]
      requestBody: { content: { application/json: { schema: { type: object, properties: { alias: { type: string } } } } } }
      responses:
        '201': { description: Creado, content: { application/json: { schema: { $ref: '#/components/schemas/Certificado' } } } }
  /v1/certificados/{id}/rotar:
    patch:
      tags: [Certificados]
      summary: Rotar certificado
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { $ref: '#/components/parameters/IdemKey' }
      requestBody: { content: { application/json: { schema: { type: object, properties: { nuevoAlias: { type: string } } } } } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Certificado' } } } }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/identity/users:
    get:
      tags: [Identity/RBAC]
      summary: Usuarios del tenant
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items: { type: array, items: { $ref: '#/components/schemas/IdentityUser' } }
  /v1/identity/roles:
    get:
      tags: [Identity/RBAC]
      summary: Roles disponibles
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items: { type: array, items: { $ref: '#/components/schemas/Role' } }
  /v1/rbac/effective-permissions:
    get:
      tags: [Identity/RBAC]
      summary: Roles y permisos efectivos del usuario actual
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  roles: { type: array, items: { type: string } }
                  permissions: { type: array, items: { type: string } }

  /v1/audit/events:
    get:
      tags: [Auditoría]
      summary: Eventos de auditoría (DML / acciones)
      parameters: [ { $ref: '#/components/parameters/Page' }, { $ref: '#/components/parameters/PageSize' } ]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/PaginatedAudit' } } } }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    OrgId:
      name: X-Organizacion-Id
      in: header
      schema: { type: string, format: uuid }
      description: Identificador de la organización (tenant).
    CorrId:
      name: X-Correlation-Id
      in: header
      schema: { type: string }
    IdemKey:
      name: X-Idempotency-Key
      in: header
      schema: { type: string }
      description: Clave de idempotencia para mutaciones.
    Page:
      name: page
      in: query
      schema: { type: integer, default: 1, minimum: 1 }
    PageSize:
      name: pageSize
      in: query
      schema: { type: integer, default: 20, minimum: 1 }

  responses:
    NotFound:
      description: No encontrado
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiError' }

  schemas:
    ApiError:
      type: object
      properties:
        code: { type: string }
        message: { type: string }
        details: {}
        traceId: { type: string }

    Pagination:
      type: object
      properties:
        page: { type: integer }
        pageSize: { type: integer }
        total: { type: integer }

    ProductoGrupo:
      type: string
      description: Agrupación de producto para menú/RBAC.
      enum: [pagos_masivos, transferencias, factoring]

    FormatoArchivo:
      type: string
      enum: [TXT, XML]

    Tenant:
      type: object
      x-db-table: sch_maestra.tm_org_organizacion
      properties:
        org_u_id: { type: string, format: uuid, x-db: sch_maestra.tm_org_organizacion.org_u_id }
        org_v_codigo: { type: string, x-db: sch_maestra.tm_org_organizacion.org_v_codigo }
        org_v_abreviatura: { type: string, x-db: sch_maestra.tm_org_organizacion.org_v_abreviatura }
        org_v_razonsocial: { type: string, x-db: sch_maestra.tm_org_organizacion.org_v_razonsocial }
        org_v_nombrecomercial: { type: string, x-db: sch_maestra.tm_org_organizacion.org_v_nombrecomercial }
        org_v_ambiente: { type: string, enum: [PRODUCCION, CERTIFICACION], x-db: sch_maestra.tm_org_organizacion.org_v_ambiente }
        subdominio: { type: string, x-db: 'sch_maestra.tm_org_organizacion.org_jb_atributos->>subdominio (derivado de atributos JSONB)' }
        keycloak:
          type: object
          properties:
            org_b_usa_keycloak: { type: boolean, x-db: sch_maestra.tm_org_organizacion.org_b_usa_keycloak }
            org_v_keycloak_realm: { type: string, x-db: sch_maestra.tm_org_organizacion.org_v_keycloak_realm }
            org_v_keycloak_client: { type: string, x-db: sch_maestra.tm_org_organizacion.org_v_keycloak_client }
            org_v_claim_orgid: { type: string, x-db: sch_maestra.tm_org_organizacion.org_v_claim_orgid }

    AppUser:
      type: object
      x-db-source: 'Keycloak / IAM (no persiste en el DDL H2H). org del usuario referencia sch_maestra.tm_org_organizacion.org_u_id'
      properties:
        id: { type: string, x-db: 'Keycloak sub' }
        username: { type: string, x-db: 'Keycloak preferred_username' }
        name: { type: string, x-db: 'Keycloak name' }
        email: { type: string, x-db: 'Keycloak email' }
        roles: { type: array, items: { type: string }, x-db: 'Keycloak realm/client roles' }
        permissions: { type: array, items: { type: string }, x-db: 'RBAC efectivo (roles → permisos). Catálogo en sch_maestra.tm_para_parametria (clase CODIGO/CONFIG)' }

    TenantContext:
      type: object
      properties:
        tenant: { $ref: '#/components/schemas/Tenant' }
        user: { $ref: '#/components/schemas/AppUser' }

    LoginResponse:
      allOf:
        - $ref: '#/components/schemas/TenantContext'
        - type: object
          properties:
            accessToken: { type: string }
            refreshToken: { type: string }
            expiresIn: { type: integer }

    DashboardSummary:
      type: object
      x-db-derived: 'Agregados calculados sobre sch_h2h.tt_pla_planilla, sch_h2h.tt_prb_respuesta y sch_operaciones.tt_ope_operacion (conteos/sumas por fecha y estado). No es una tabla.'
      properties:
        fechaOperacion: { type: string, format: date }
        kpis:
          type: object
          properties:
            planillasHoy: { type: integer }
            montoEnviadoHoy: { type: number }
            operacionesAprobadas: { type: integer }
            operacionesRechazadas: { type: integer }
            certificadosPorVencer: { type: integer }
        pipeline:
          type: array
          items:
            type: object
            properties:
              estado: { type: string }
              label: { type: string }
              cantidad: { type: integer }
